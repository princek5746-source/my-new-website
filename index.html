<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortFolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #menu{
            border: 0px outset;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color: whitesmoke;
            box-shadow: 3px 3px 5px gray;
        }
        nav a{
            margin-left: 60px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        #menu h1{
            font-size: 40px;
            letter-spacing: 3px;
            color:orangered;
            text-shadow: 2px 2px 3px black;
        }
        body{
            /* background-color: lightgrey; */
            background-image: linear-gradient(140deg, orange, white, green);
        }
        #pd{
            display: inline-block;
            width:45%;
            position: relative;;
        }
        #pp{
            display: inline-block;
            width: 45%;
            position: relative;
        }
        #pd h1 {
            position: absolute;
            left:100px;
            display: inline-block;
            letter-spacing: 2px;
        }
        #pp img{
                width: 350px;
                height: 350px;
                border: 5px outset;
                border-radius: 50%;
                outline: 5px solid gray;
                position: absolute;
                box-shadow: 7px 7px 3px white;
                top: 150px;
                left:100px;
                background-color: wheat;
            }
        #hh{
            top: 150px;
        }
        #hhh{
            top: 200px;
        }
        #hhhh{
            top: 250px;
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
        }
        span{
            color:lightseagreen;
        }
        #cbtn{
            position: absolute;
            top:300px;
            left:250px;
            text-decoration: none;
            color:white;
            background-color: black;
            padding: 15px;
            border: 2px solid white;
            border-radius: 30px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 2px 2px 10px;
            letter-spacing: 2px;
        }
        #sml{
            width: 45%;
            position:relative;
            /* border: 2px outset; */
            height: 70px;
            top:375px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fa-brands{
            font-size: 30px;
            margin-left: 30px;
            box-shadow: 3px 3px 3px white;
            border-radius: 50%;
        }
        #cbtn:hover{
            background-color: darkgreen;
            color:white;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>Hubnet</h1>
        <nav>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Skills</a>
            <a href="">Education</a>
            <a href="">Work</a>
            <a href="">Exper</a>
            <a href="">Contact</a>
        </nav>
    </div>
    <div id="pd">
        <h1 id="hh"><span>Hi</span>, There </h1>
        <h1 id="hhh">Hubnet Education</h1>
        <h1 id="hhhh">I am a Full Stack <span>Developer</span></h1>
        <a href="logo.png" download="cv.png" id="cbtn">About Me</a>
    </div>
    <div id="pp">
        <img src="hubnet logo.jpeg" alt="">
    </div>
    <div id="sml">
        <a href=""><i class="fa-brands fa-youtube"></i></a>
        <a href=""><i class="fa-brands fa-facebook"></i></a>
        <a href=""><i class="fa-brands fa-instagram"></i></a>
        <a href=""><i class="fa-brands fa-linkedin"></i></a>
        <a href=""><i class="fa-brands fa-github"></i></a>
    </div>
</body>
</html>
